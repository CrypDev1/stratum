[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
ffi = false
fs_permissions = [{ access = "read", path = "./" }]
gas_reports = ["*"]

[profile.ci]
verbosity = 4
fuzz = { runs = 10000 }
invariant = { runs = 256, depth = 128 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"

[rpc_endpoints]
bsc = "${BSC_RPC_URL}"
bsc_testnet = "${BSC_TESTNET_RPC_URL}"

[etherscan]
# Etherscan V2 unified endpoint (the old api.bscscan.com V1 API is deprecated). NOTE: BSC (chainid 56)
# verification via this API requires a PAID Etherscan plan; a free key returns "Free API access is not
# supported for this chain." Free alternatives that work from Codespaces: `--verifier sourcify`, or the
# BscScan web UI with `forge verify-contract --show-standard-json-input`. See VERIFY.md.
bsc = { key = "${BSCSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=56", chain = 56 }
bsc_testnet = { key = "${BSCSCAN_API_KEY}", url = "https://api-testnet.bscscan.com/api" }
